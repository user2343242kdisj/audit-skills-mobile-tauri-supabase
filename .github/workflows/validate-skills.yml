name: Validate skills

on:
  push:
    paths:
      - 'skills/**'
      - 'tools/validate-skill.py'
  pull_request:
    paths:
      - 'skills/**'
      - 'tools/validate-skill.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run validator
        run: python3 tools/validate-skill.py --all
