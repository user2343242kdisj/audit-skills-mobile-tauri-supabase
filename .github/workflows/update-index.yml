name: Update index

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.github/workflows/update-index.yml'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate index.json
        run: |
          python3 << 'EOF'
          import os, json, re
          from datetime import datetime, timezone

          skills = []
          for s in sorted(os.listdir("skills")):
              p = f"skills/{s}/SKILL.md"
              if not os.path.isfile(p):
                  continue
              content = open(p, encoding="utf-8").read()
              fm = re.match(r"^---\n(.*?)\n---", content, re.DOTALL)
              desc = ""
              subdomain = ""
              if fm:
                  m = re.search(r"^description:\s*(.+?)(?:\n[a-z_]+:|\n---|$)", fm.group(1), re.MULTILINE | re.DOTALL)
                  if m:
                      desc = re.sub(r"\s+", " ", m.group(1).strip().strip('"').strip("'").strip(">-").strip()).strip()
                  sd = re.search(r"^subdomain:\s*(.+)$", fm.group(1), re.MULTILINE)
                  if sd:
                      subdomain = sd.group(1).strip()
              skills.append({
                  "name": s,
                  "description": desc,
                  "subdomain": subdomain,
                  "domain": "cybersecurity",
                  "path": f"skills/{s}",
              })

          idx = {
              "version": "2.0.0",
              "generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "domain": "cybersecurity",
              "scope": "mobile-app + tauri-desktop + supabase-backend security audit",
              "total_skills": len(skills),
              "skills": skills,
          }

          with open("index.json", "w", encoding="utf-8") as f:
              json.dump(idx, f, indent=2)
          print(f"Updated index.json: {len(skills)} skills")
          EOF

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --staged --quiet || git commit -m "chore: auto-update index.json"
          git push
